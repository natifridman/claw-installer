# On OpenShift, the Service has two ports: the gateway (18789) and the
# oauth-proxy (8443). The serving-cert annotation tells OpenShift to
# auto-generate a TLS certificate for the oauth-proxy.
# On plain Kubernetes, only the gateway port is needed and the
# serving-cert annotation is omitted.
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
  annotations:
    # OpenShift only — auto-generates the openclaw-proxy-tls Secret
    service.beta.openshift.io/serving-cert-secret-name: openclaw-proxy-tls
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP
    # OpenShift only — oauth-proxy listens here
    - name: oauth-ui
      port: 8443
      targetPort: 8443
      protocol: TCP
