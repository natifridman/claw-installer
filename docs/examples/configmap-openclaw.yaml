# Main OpenClaw configuration. The installer generates openclaw.json
# with the gateway token, model settings, and agent definitions.
# On OpenShift, bind is set to "loopback" and allowedOrigins includes
# the Route URL (the oauth-proxy handles external access).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "auth": {
          "token": "<generated-gateway-token>"
        },
        "controlUi": {
          "dangerouslyAllowHostHeaderOriginFallback": true,
          "dangerouslyDisableDeviceAuth": true,
          "allowedOrigins": [
            "https://openclaw-alice-myagent-openclaw.apps.your-cluster.example.com"
          ]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": { "primary": "anthropic-vertex/claude-sonnet-4-6" }
        },
        "list": [
          {
            "id": "alice_myagent",
            "name": "My Agent",
            "workspace": "~/.openclaw/workspace-alice_myagent",
            "model": { "primary": "anthropic-vertex/claude-sonnet-4-6" },
            "subagents": { "allowAgents": ["*"] }
          }
        ]
      },
      "skills": {
        "load": {
          "extraDirs": ["~/.openclaw/skills"],
          "watch": true,
          "watchDebounceMs": 1000
        }
      },
      "cron": { "enabled": true }
    }
