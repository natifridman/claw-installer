# API keys and the gateway token. The installer sets whichever keys
# you provide — unused keys are simply absent.
# For Vertex AI, GOOGLE_CLOUD_PROJECT is auto-extracted from the SA JSON.
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  OPENCLAW_GATEWAY_TOKEN: "<generated-gateway-token>"
  # Include whichever provider keys you use:
  # ANTHROPIC_API_KEY: "<your-key>"
  # OPENAI_API_KEY: "<your-key>"
  # GOOGLE_CLOUD_PROJECT: "<auto-extracted-from-sa-json>"
  # GOOGLE_CLOUD_LOCATION: "us-central1"
---
# GCP service account secret (Vertex AI only).
# Mounted at /home/node/gcp/sa.json in the gateway container.
apiVersion: v1
kind: Secret
metadata:
  name: gcp-sa
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  sa.json: "<contents of your GCP service account JSON>"
